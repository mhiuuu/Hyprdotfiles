# ~/.config/starship.toml

add_newline = true
command_timeout = 1000

format = """
$cmd_duration\
$os$hostname\
$directory\
$git_branch\
$git_status \
$python\
$aws\
$golang\
$java\
$nodejs\
$rust\
$ruby\
$scala\
$dart\
$conda\
$pijul_channel\
$lua\
$rlang\
$package\
$buf\
$memory_usage\
$docker_context\
[оӮ¶](#1C3A5E)$time[оӮҙ](#1C3A5E)
$character"""


continuation_prompt = 'в–¶в–¶ '

[character]
success_symbol = "[в”” вҖўп‘„ рҹҡҖ пӮ©](bold fg:green) "
error_symbol = "[в”” вҖўп‘„ рҹ”Ҙ у°…ҷ](bold fg:red) "
[time]
disabled = false
time_format = "%r" # Hour:Minute Formatx
style = "bg:#1d2230"
format = '[[уұ‘Қ $time ](bg:#1C3A5E fg:#8DFBD2)]($style)'

[cmd_duration]
min_time = 0
format = '[оӮ¶](bold fg:green)[оӯұ $duration](bold bg:green fg:black)[оӮҙ](bold fg:green) вҖўвҖў '

[os]
disabled = true

# Shows the hostname
[hostname]
ssh_only = false
format = '[оӮ¶](bold fg:yellow)[$hostname](bold bg:yellow fg:black)[оӮҙ](bold fg:yellow) вҖўвҖў '
disabled = false
ssh_symbol = "о¬Ғ "

# Shows current directory
[directory]
truncation_length = 3
fish_style_pwd_dir_length=2
home_symbol = 'у°Ӣң ~'
read_only_style = '197'
read_only = ' пҖЈ '
format = '[оӮ¶](bold fg:white)[$path](bold bg:white fg:black)[$read_only](bold bg:white fg:black)[оӮҙ](bold fg:white) вҖўвҖў'

# Shows current git branch
[git_branch]
symbol = "пҗҳ "
format = 'via [$symbol$branch]($style)'
# truncation_length = 4
truncation_symbol = 'вҖҰ/'
style = 'bold green'

# Shows current git status
[git_status]
format = '[$all_status$ahead_behind]($style) '
style = 'bold green'
conflicted = 'рҹҸі'
up_to_date = ''
untracked = 'п”© '
ahead = 'вҮЎ${count}'
diverged = 'вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}'
behind = 'вҮЈ${count}'
stashed = 'пЈ– '
modified = 'пҒ„ '
staged = '[++\($count\)](green)'
renamed = 'пӘ¶ '
deleted = 'пҖ” '


# ---

[aws]
symbol = "оҢҪ  "

[buf]
symbol = "п’қ "

[c]
symbol = "оҳһ "

[conda]
symbol = "п„Ң "

[dart]
symbol = "оһҳ "

[docker_context]
symbol = "пҢҲ "

[golang]
symbol = "оҳ§ "

[java]
symbol = "оү– "

[lua]
symbol = "оҳ  "

[memory_usage]
symbol = "у°Қӣ "
disabled = true
style='bold dimmed white'
threshold = 1
format = "$symbol [${ram}(|${swap})]($style) "

[nodejs]
symbol = "оңҳ "

[package]
symbol = "у°Ҹ— "

[pijul_channel]
symbol = "пҗҳ "

[python]
symbol = "оҲө "
pyenv_version_name = true

[ruby]
symbol = "оһ‘ "

[rlang]
symbol = "у°ҹ” "

[rust]
symbol = "оһЁ "

[scala]
symbol = "оң· "
